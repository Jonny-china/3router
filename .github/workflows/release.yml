name: Publish to npm

# GitHub Release 发布时，通过 Trusted Publishers（OIDC）自动发布到 npm，无需 NPM_TOKEN
# 前置：已在 npmjs.com 的 3router 包设置里配置 Trusted Publisher → GitHub Actions
on:
  release:
    types: [published]

permissions:
  id-token: write   # OIDC：允许 GitHub 生成 OIDC token（trusted publishers 关键）
  contents: write   # 回写版本号到 main

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 从 Release tag 提取版本号并写回 package.json
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag 格式非法: $TAG（应为 vX.Y.Z，如 v0.2.1）"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if git diff --quiet package.json; then
            echo "package.json 已是 v$VERSION，无需提交"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore: release ${VERSION} [skip ci]"
            git push origin HEAD:main
            echo "✓ 已将 version=$VERSION 提交回 main"
          fi

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'           # trusted publishers 要求 npm ≥ 11.5.1，Node 24 自带
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: 安装依赖
        run: |
          pnpm install --frozen-lockfile
          cd web && pnpm install --frozen-lockfile

      - name: 发布到 npm（OIDC，无需 token）
        # prepublishOnly 钩子自动执行 typecheck + build（tsdown 产出 dist/）
        # 无需 NODE_AUTH_TOKEN —— npm CLI 自动用 OIDC 短期凭证
        run: npm publish --access public
