name: Build & Publish

# GitHub Release 发布时：
#   1. 矩阵构建 5 平台 --compile 二进制（方案 B 分发）
#   2. 上传 tar.gz / zip 到 GitHub Release
#   3. 发布各平台子包 @3router/<platform> 到 npm（OIDC，无需 NPM_TOKEN）
#   4. 发布主包 3router（含 shim + optionalDependencies）
#
# 前置（一次性）：
#   - npm 创建 organization "3router"
#   - 6 个包（3router + 5 个 @3router/*）在 npmjs.com 配置 Trusted Publisher
#     → GitHub org: Jonny-china, repo: 3router, workflow filename: release.yml
on:
  release:
    types: [published]

permissions:
  contents: write   # 上传 Release 资产 + 回写版本号到 main
  id-token: write    # OIDC trusted publishers（npm 发布无需 token）

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-darwin-arm64, platform: darwin-arm64, bin: "3router", archive: tar.gz }
          - { target: bun-darwin-x64, platform: darwin-x64, bin: "3router", archive: tar.gz }
          - { target: bun-linux-x64, platform: linux-x64, bin: "3router", archive: tar.gz }
          - { target: bun-linux-arm64, platform: linux-arm64, bin: "3router", archive: tar.gz }
          - { target: bun-windows-x64, platform: win32-x64, bin: "3router.exe", archive: zip }

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 从 Release tag 提取版本号
        id: ver
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag 格式非法: $TAG（应为 vX.Y.Z，如 v0.3.0）"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'           # trusted publishers 要求 npm ≥ 11.5.1，Node 24 自带
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: 安装依赖
        run: |
          pnpm install --frozen-lockfile --no-optional
          cd web && pnpm install --frozen-lockfile

      - name: 构建前端（单文件化）
        run: pnpm build:web && pnpm build:copy-web

      - name: 写主包版本号（编译前，确保 --compile 二进制内联正确版本）
        # cli.ts 经 import attribute（type:"json"）把根 package.json 的 version
        # 内联进二进制；必须在编译前写好目标版本，否则二进制会冻死上一 release 的版本号
        # （见 references/known-pitfalls.md「编译先于根 version bump → 二进制内联旧版本号」）
        run: npm version ${{ steps.ver.outputs.version }} --no-git-tag-version --allow-same-version

      - name: 编译二进制（bun build --compile --target）
        run: bun scripts/build-compile.ts --target=${{ matrix.target }}

      - name: 写子包版本号
        run: |
          cd packages/${{ matrix.platform }}
          npm version ${{ steps.ver.outputs.version }} --no-git-tag-version --allow-same-version

      - name: 打包发布资产
        run: |
          cd packages/${{ matrix.platform }}
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "../../3router-${{ matrix.platform }}.zip" "${{ matrix.bin }}"
          else
            tar -czf "../../3router-${{ matrix.platform }}.tar.gz" "${{ matrix.bin }}"
          fi

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            3router-${{ matrix.platform }}.tar.gz
            3router-${{ matrix.platform }}.zip

      - name: 发布平台子包到 npm（OIDC）
        run: |
          cd packages/${{ matrix.platform }}
          npm publish --access public

  publish-main:
    name: Publish main package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 从 Release tag 提取版本号
        id: ver
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: 安装依赖（typecheck 需要）
        run: pnpm install --frozen-lockfile

      - name: 写主包版本号 + 同步 optionalDependencies 版本
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(p.optionalDependencies || {})) p.optionalDependencies[k] = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: 回写版本号到 main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${{ steps.ver.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: 发布主包到 npm（OIDC，prepublishOnly 自动 typecheck）
        run: npm publish --access public
