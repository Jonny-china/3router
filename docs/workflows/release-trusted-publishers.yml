# =============================================================================
# 阶段 2 备用工作流：Trusted Publishers（OIDC，免 NPM_TOKEN）
# =============================================================================
#
# ⚠️ 这是备用模板，不放在 .github/workflows 根目录，因此不会自动触发。
#    何时启用：在 npm 上用 NPM_TOKEN 手动发布「首个版本」之后。
#    （npm 的 trusted publisher 只能对"已存在"的包配置，首版绕不开 token）
#
# ── 启用步骤 ──────────────────────────────────────────────────────────────────
#   1. 本地 npm publish 发布首个版本（如 v0.2.0）
#   2. 打开 https://www.npmjs.com/package/3router → Settings → Trusted Publisher
#      → 选 GitHub Actions，填：
#        - GitHub username/org:  Jonny-china
#        - Repository:           3router
#        - Workflow filename:    release.yml   ← 只填文件名，带 .yml
#        - Allowed actions:      npm publish
#   3. 用本文件内容覆盖 .github/workflows/release.yml（文件名保持 release.yml）
#   4. （可选·更安全）npm 包 Settings → Publishing access →
#      选 "Require 2FA and disallow tokens"，并删除 GitHub 的 NPM_TOKEN secret
#
# ── 与阶段 1（NPM_TOKEN 版）的差异 ────────────────────────────────────────────
#   - 顶层加 permissions.id-token: write（OIDC 关键）
#   - Node 20 → 24（trusted publishers 要求 npm CLI ≥ 11.5.1，Node 24 自带）
#   - publish 步骤去掉 NODE_AUTH_TOKEN（npm CLI 自动检测 OIDC 环境并交换短期凭证）
#
# ── 注意 ─────────────────────────────────────────────────────────────────────
#   - 每个包只能配一个 trusted publisher
#   - 私有仓库不生成 provenance（出处签名），但发布本身不受影响
#   - npm 那边填的 workflow filename 必须与实际文件名一致（release.yml）
#   - package.json 的 repository.url 需与本仓库 URL 一致，否则发布失败
# =============================================================================

name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write   # OIDC：允许 GitHub 生成 OIDC token（trusted publishers 关键）
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 Release tag 与 package.json 版本一致
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Release tag: $TAG"
          echo "package.json version: v$PKG_VERSION"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "::error::版本不匹配 — release tag ($TAG) 与 package.json (v$PKG_VERSION) 不一致"
            exit 1
          fi
          echo "✓ 版本一致"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'           # trusted publishers 要求 npm ≥ 11.5.1，Node 24 自带
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 发布到 npm（OIDC，无需 token）
        # prepublishOnly 钩子自动执行 typecheck + build（tsdown 产出 dist/）
        # 无需 NODE_AUTH_TOKEN —— npm CLI 自动用 OIDC 短期凭证
        run: npm publish --access public
